<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Register</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="./css/login.css">
</head>
<style>
  .input-group-text {
    cursor: pointer;
  }
</style>

<body class="bg-light">

  <div class="container">
    <div class="row justify-content-center align-items-center vh-100">

      <div class="col-md-5">

        <div class="card shadow p-4">

          <h2 class="text-center mb-4">Register</h2>

          <form id="registerForm">

            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="regPassword" required>

                <span class="input-group-text" onclick="togglePassword('regPassword', 'icon1')">
                  <i id="icon1" class="fa fa-eye-slash"></i>
                </span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="confirmPassword" required>

                <span class="input-group-text" onclick="togglePassword('confirmPassword', 'icon2')">
                  <i id="icon2" class="fa fa-eye-slash"></i>
                </span>
              </div>
            </div>

            <button type="submit" class="btn btn-success w-100">
              Register
            </button>

          </form>

          <p class="text-center mt-3">
            Already have an account?
            <a href="login.html">Login</a>
          </p>

        </div>

      </div>

    </div>
  </div>

  <script src="./js/register.js"></script>

</body>

</html>
